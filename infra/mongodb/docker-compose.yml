version: '3'

services:
  mongo-room-db:
    image: mongodb/mongodb-community-server
    restart: always
    ports:
       - 27027:27017
    environment:
      MONGODB_INITDB_ROOT_USERNAME: room_service
      MONGODB_INITDB_ROOT_PASSWORD: room_service
    volumes:
      - type: bind
        source: ./room-service/data
        target: /data/db
  mongo-booking-db:
    image: mongodb/mongodb-community-server
    restart: always
    ports:
       - 27028:27017
    environment:
      MONGODB_INITDB_ROOT_USERNAME: booking_service
      MONGODB_INITDB_ROOT_PASSWORD: booking_service
    volumes:
      - type: bind
        source: ./booking-service/data
        target: /data/db
