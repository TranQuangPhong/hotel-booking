version: '3.8'

services:
  broker:
    image: confluentinc/cp-kafka:8.2.0
    hostname: broker
    container_name: broker
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_NODE_ID: 1
      # Defines how listeners are mapped to security protocols
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      # IMPORTANT: This is what Kafka tells clients to connect to!
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092'
      # The actual ports Kafka binds to inside the container
      KAFKA_LISTENERS: 'PLAINTEXT://broker:29092,CONTROLLER://broker:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      
      # KRaft specifics (Replaces Zookeeper)
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@broker:29093'
      CLUSTER_ID: 'cbKlnrPfS8aya8kbludPpw' # Required static ID for KRaft
      
      # Basic config
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "9099:8080"
    depends_on:
      - broker
    environment:
      # Cấu hình kết nối tới Cluster
      - KAFKA_CLUSTERS_0_NAME=Local-KRaft
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=broker:29092
      # Cho phép UI tạo/xóa topic trực tiếp
      - KAFKA_CLUSTERS_0_READONLY=false
      # Kết nối JMX để xem biểu đồ CPU/Ram của Broker
      - KAFKA_CLUSTERS_0_JMXHOST=broker
      - KAFKA_CLUSTERS_0_JMXPORT=9101
