services:
  postgres:
    image: postgres:latest
    container_name: postgres-user
    environment:
      POSTGRES_USER: user_service
      POSTGRES_PASSWORD: user_service
      POSTGRES_DB: users
    ports:
      - "5440:5432"
    volumes:
      - postgres_data_user:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_service -d users"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_user: